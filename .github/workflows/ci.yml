name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests + coverage
        run: npm run test:coverage

  backend:
    name: Backend (cargo test + check)
    # macOS arm64: matches the only supported target and the bundled
    # aarch64-apple-darwin ffmpeg/ffprobe sidecars (the build script requires a
    # sidecar for the build target, which does not exist for Linux/x86_64).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --target aarch64-apple-darwin
      - name: cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml --target aarch64-apple-darwin
